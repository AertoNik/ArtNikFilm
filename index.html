<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtNikFilm | Premium AI Cinema</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Space Grotesk"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        darkBg: '#0a0a0a',
                        lightBg: '#f8f9fa'
                    }
                }
            }
        }
    </script>
    <style>
        body { transition: background-color 0.5s ease, color 0.5s ease; }
        ::selection { background-color: #dc2626; color: white; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        
        .rating-badge {
            background: linear-gradient(90deg, #dc2626 0%, #991b1b 100%);
        }
    </style>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "f9205168-0f63-4649-b4f0-719adbea4626",
        });
      });
    </script>
</head>
<body class="bg-lightBg text-black dark:bg-darkBg dark:text-white min-h-screen antialiased">

    <nav class="fixed top-0 w-full px-8 py-5 flex justify-between items-center z-50 bg-white/70 dark:bg-darkBg/70 backdrop-blur-md border-b border-gray-200 dark:border-white/10 transition-colors duration-500">
        <div class="text-2xl font-bold tracking-[0.2em] uppercase cursor-pointer hover:text-red-600 transition-colors">
            ArtNikFilm
        </div>
        
        <div class="hidden md:flex items-center space-x-10 text-sm tracking-widest uppercase font-semibold">
            <a href="#" class="hover:text-red-600 transition-colors">Catalog</a>
            <a href="#" class="hover:text-red-600 transition-colors">Creators</a>
            <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-white/10 transition-colors">
                <svg id="moonIcon" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <svg id="sunIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            </button>
        </div>
    </nav>

    <section class="relative h-screen flex flex-col items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-gray-200 dark:bg-[#0a0a0a] z-0"></div> 
        <div class="absolute inset-0 bg-gradient-to-t from-lightBg via-transparent to-transparent dark:from-darkBg dark:via-darkBg/50 dark:to-transparent z-10"></div>
        
        <div class="relative z-20 text-center px-4 mt-16">
            <div class="inline-block mb-6 border border-red-600 px-3 py-1">
                <span class="text-red-600 font-bold tracking-[0.3em] uppercase text-xs">Premiere</span>
            </div>
            <h1 class="text-6xl md:text-9xl font-black uppercase tracking-tighter mb-6 leading-none">The <br> Warden</h1>
            <p class="text-gray-600 dark:text-gray-400 max-w-2xl mx-auto text-lg md:text-xl font-light mb-10 tracking-wide">
                A surveillance odyssey. Experience the ultimate control through the eyes of the AI Warden.
            </p>
            
            <div class="flex flex-col sm:flex-row justify-center items-center gap-4">
                <button onclick="simulateVisit('warden')" class="bg-black text-white dark:bg-white dark:text-black px-12 py-4 font-bold uppercase tracking-widest hover:bg-red-600 dark:hover:bg-red-600 hover:text-white dark:hover:text-white transition-all duration-300 w-full sm:w-auto shadow-xl">
                    Watch Now
                </button>
                <div class="font-mono text-sm tracking-widest border border-black/20 dark:border-white/20 px-6 py-4">
                    FILE // 05:07
                </div>
            </div>
        </div>
    </section>

    <section class="py-24 px-6 md:px-12 max-w-screen-2xl mx-auto relative z-20">
        <div class="flex justify-between items-end mb-16 border-b border-gray-300 dark:border-white/10 pb-6">
            <h2 class="text-4xl font-bold uppercase tracking-widest">Studio Releases</h2>
            <div class="text-xs font-mono text-gray-500 uppercase tracking-[0.2em]">Curated AI Cinema</div>
        </div>

        <div id="filmGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            </div>
    </section>

    <script>
        // DATA FOR FILMS
        // Добавил поле 'posterUrl' для будущих картинок. Пока оставь пустым ('')
        const films = [
            { id: 'warden', title: 'The Warden', genre: 'Sci-Fi / Thriller', duration: '05:07', baseRating: 9.2, posterUrl: '' },
            { id: 'glassminds', title: 'Glass Minds', genre: 'Sci-Fi / Drama', duration: '06:07', baseRating: 8.8, posterUrl: '' },
            { id: 'return', title: 'Point of No Return', genre: 'Sci-Fi Short', duration: '07:24', baseRating: 8.5, posterUrl: '' },
            { id: 'detective', title: 'The Detective', genre: 'Neo-Noir', duration: '05:12', baseRating: 8.9, posterUrl: '' }
        ];

        // LOGIC: THEME TOGGLE
        const themeToggleBtn = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;
        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            updateIcons();
        });

        function updateIcons() {
            const isDark = htmlElement.classList.contains('dark');
            document.getElementById('sunIcon').classList.toggle('hidden', !isDark);
            document.getElementById('moonIcon').classList.toggle('hidden', isDark);
        }
        updateIcons();

        // LOGIC: VIEWS & RATINGS
        function simulateVisit(id) {
    let views = parseInt(localStorage.getItem(`views_${id}`) || "0");
    views++;
    localStorage.setItem(`views_${id}`, views);
    renderGrid(); 
    
    // ДОБАВЛЕНА ЭТА СТРОЧКА: переход на страницу фильма, если нажали на The Warden
    if (id === 'warden') {
        window.location.href = 'movie.html';
    }
}

        function renderGrid() {
            const grid = document.getElementById('filmGrid');
            grid.innerHTML = films.map(film => {
                const views = localStorage.getItem(`views_${film.id}`) || Math.floor(Math.random() * 100); 
                const displayRating = film.baseRating;

                return `
                <div class="group cursor-pointer" onclick="simulateVisit('${film.id}')">
                    <div class="w-full aspect-[2/3] bg-gray-300 dark:bg-[#111] mb-6 relative overflow-hidden transition-all duration-500 shadow-lg group-hover:shadow-red-900/20">
                        
                        ${film.posterUrl ? `<img src="${film.posterUrl}" class="absolute inset-0 w-full h-full object-cover z-0" alt="${film.title}">` : ''}
                        
                        <div class="absolute inset-0 bg-black/10 dark:bg-black/40 group-hover:bg-black/20 dark:group-hover:bg-black/60 transition-all duration-500 z-10"></div>
                        
                        <div class="absolute top-4 left-4 z-30">
                            <div class="rating-badge text-white text-[10px] font-bold px-2 py-1 rounded shadow-lg font-mono">
                                RATING ${displayRating}/10
                            </div>
                        </div>
                        
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-500 scale-90 group-hover:scale-100 z-30">
                            <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center pl-1 shadow-2xl">
                                <svg class="w-6 h-6 text-black" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                        
                        <div class="absolute bottom-4 right-4 z-30">
                            <span class="font-mono bg-black/80 text-white backdrop-blur-sm text-[10px] px-2 py-1 tracking-widest border border-white/10">
                                ${film.duration}
                            </span>
                        </div>
                    </div>
                    
                    <div class="space-y-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="text-[10px] text-red-600 font-bold tracking-[0.2em] uppercase mb-1">${film.genre}</div>
                                <h3 class="text-xl font-bold uppercase tracking-tight group-hover:text-red-600 transition-colors leading-tight">${film.title}</h3>
                            </div>
                        </div>
                        <div class="flex items-center gap-4 border-t border-gray-200 dark:border-white/10 pt-4 font-mono text-[10px] text-gray-500 uppercase tracking-widest">
                            <div class="flex items-center gap-1.5">
                                <span class="text-black dark:text-white font-bold text-xs">${views}</span> Views
                            </div>
                            <div class="flex items-center gap-1.5 border-l border-gray-300 dark:border-white/20 pl-4">
                                <span class="text-black dark:text-white font-bold text-xs">${displayRating}</span> Score
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Initial Render
        renderGrid();
    </script>
</body>
</html>
